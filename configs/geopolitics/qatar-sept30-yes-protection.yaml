event:
  # This must be the PARENT grouped ("neg risk") event slug (id 624242), not
  # any single leg's market slug -- market_verifier fetches /events/slug/{this}
  # and matches all 19 legs by groupItemTitle. Corrected 2026-07-06: this
  # field previously held the Qatar leg's own market slug, which 404'd against
  # the events endpoint and meant the verifier was never actually reachable.
  slug: "where-will-the-next-next-round-of-us-iran-peace-talks-beptptpt-20260623023740663"
  # Pinned 2026-07-06 after reviewing inspect-location output: all 19 outcomes'
  # condition_id/token IDs matched the live Gamma event, and this is the
  # verbatim event.description digest at review time. If Polymarket edits the
  # resolution text, this pin will make the verifier fail closed until re-reviewed.
  expected_rule_text_sha256: "217d3c15d9d6a59756f157b6dc10d6f264479442e75587983defb7aa8489a960"
  question: "Will the next diplomatic US-Iran meeting be in Qatar by September 30, 2026?"
  deadline_date: "2026-09-30"
  held_location: "qatar"
  # Verbatim resolution text pulled from Polymarket (Gamma API) on 2026-07-06.
  resolution_rules: |
    On June 22, the first round of U.S.-Iran diplomatic talks in Switzerland concluded, with mediators reporting progress toward a roadmap for a final deal and follow-on technical talks expected to continue.

    This market will resolve according to the country in which the next formal senior-level round of peace talks between representatives of the United States and Iran begins by September 30, 2026, 11:59 PM ET.

    A qualifying round must be a deliberate in-person diplomatic meeting or negotiating round concerning US-Iran relations, involving senior representatives of both the United States and Iran who are acting in an official capacity and are authorized to conduct or materially direct diplomacy on behalf of their governments.

    Indirect in-person diplomacy through designated mediators, facilitators, or interlocutors will qualify, provided senior representatives of both the United States and Iran are participating in the same formal diplomatic process with the knowledge and authorization of their respective governments. The representatives need not be in the same room at the same time.

    Follow-on technical talks from the June 22 Switzerland round will not qualify by themselves. Technical, staff-level, working-group, implementation, monitoring, preparatory, or deconfliction meetings will not qualify unless they occur as part of a new formally convened senior-level U.S.-Iran peace-talks round.

    Brief greetings, chance encounters, photo opportunities, ceremonial appearances, or talks not deliberately aimed at diplomacy or negotiation will not count.

    The meeting must be in-person (including indirect in-person meetings) and must be publicly acknowledged by either government or reported by a consensus of credible media. Remote meetings, phone calls, or other meetings where the relevant parties are not present will not count.

    If a qualifying round occurs in more than one country, resolution will be based on the country where the first qualifying senior-level diplomatic session begins.

    If no qualifying round begins by September 30, 2026, 11:59 PM ET, this market (and every location outcome) resolves NO -- "No Meeting by September 30" resolves YES instead.

    Resolution sources: official information from the governments of the United States and Iran, and a consensus of credible reporting.

  # User's own thesis/background reasoning as of 2026-07-09, given to be kept
  # in mind by the classifier LLM (not re-tested each time it's restated).
  # Weighed as prior context only -- the classifier still must classify
  # strictly from article text and the resolution rules above.
  analyst_context: |
    Core thesis (updated 2026-07-09): despite the active US-Iran military escalation, a return to a
    formal senior-level negotiating round by the September 30, 2026 deadline remains the base case. It is
    in both governments' interest to negotiate -- escalation, strikes, and sanctions function here as
    bargaining leverage and a backdrop to talks, not as a foreclosure of them, and past cycles show
    hostilities preceding rather than cancelling a return to the table. Treat war, strike, sanctions,
    retaliation, and "standoff" headlines as backdrop/noise for THIS market, NOT as evidence that a
    qualifying round will not happen.

    Do NOT read escalation as a no_meeting/collapse signal. A no_meeting reading requires a credible
    source EXPLICITLY reporting that a qualifying senior-level round is cancelled, called off, or
    foreclosed through September 30, 2026 -- general hostilities, troop movements, ceasefire failures, or
    angry rhetoric do not meet that bar. Escalation may lower near-term venue confidence but does not by
    itself flip the market to No Meeting.

    Venue lean: Qatar/Doha remains the most plausible host for a mediated senior-level round (Qatari
    mediation channel), but do not treat that lean as a confirmed venue -- only an explicit report of a
    formally convened senior-level round beginning somewhere resolves anything. A confirmed senior-level
    round in a NON-Qatar venue -- or named senior principals (Witkoff, Kushner, Vance; Araqchi, Ghalibaf,
    Gharibabadi) convening a formal round elsewhere -- is the main kill signal for the Qatar thesis.

    Resolution nuance to apply strictly from the rules: INDIRECT in-person diplomacy through designated
    mediators DOES qualify, provided senior representatives of both governments participate in the same
    formally convened diplomatic process (they need not meet directly or be in the same room). Therefore
    "Iran denies direct talks with US envoys" does NOT negate a qualifying Doha round if a senior-level
    round is formally convened there via Qatari mediation. Follow-on technical, staff-level,
    working-group, implementation, monitoring, preparatory, or deconfliction meetings do NOT resolve the
    market on their own.

    Qualifying-language examples for qatar: "high-level direct talks in Doha", "formal senior-level
    round begins/convened in Doha", "Qatar to host the next senior US-Iran round". Non-resolving
    language: "technical teams", "working group", "implementation talks", "mediators met",
    "preparatory", "deconfliction", and military/escalation coverage with no formally convened senior
    round.

