position:
  source: "onchain"
  # Pulled from your wallet (0xf9021f4aa0cec3059a6b1da1083a68c9dc5fa267) via
  # Polymarket's data-api on 2026-07-06: 3255.317 Qatar-YES shares, avg price
  # 0.2682, current price 0.255.
  held_yes_shares: 3255.317
  max_yes_shares_to_sell: 5000
  # Roughly matches current position value (~$830) so a rotation buy can use
  # the sale proceeds without materially increasing total dollar exposure.
  max_rotation_usd_to_buy: 900

trigger:
  auto_execute_level: 4
  trusted_single_source_execution: true

classifier:
  provider: "codex_cli"
  # Not "gpt-5" -- this ChatGPT-auth Codex account rejects that model name
  # with a 400 ("not supported when using Codex with a ChatGPT account").
  # gpt-5.5 is what this account's own ~/.codex/config.toml already uses and
  # is confirmed working end-to-end as of 2026-07-07.
  model: "gpt-5.5"
  # 2-pass agreement required before any live trade fires (2026-07-06 hardening):
  # this market settles on a technical-vs-senior-level wording distinction that
  # a single classifier pass can misread. A no_meeting collapse still fast-paths
  # on one pass if tier-one-sourced and unambiguous (see classify_agreement).
  passes: 2
  require_pass_agreement: true
  require_verbatim_quote: true
  include_market_rule_text: true
  if_api_down: "urgent_alert_no_trade"
  # Raised again 2026-07-09: with classify_feed_summaries on (Reuters/Dawn wire
  # summaries now classify) and evolving war liveblogs re-classifying on change,
  # the budget must not be the reason a real confirmation is dropped. At passes:2
  # these caps allow ~20 fully-classified articles/hour, 120/day; the keyword
  # gate + the listing-delta guard (only re-classify a liveblog when the NEW
  # lines themselves name a venue/principal) keep real throughput well under this.
  max_escalations_per_hour: 60
  max_escalations_per_day: 360
  max_classifier_errors_per_hour: 3
  # Enabled 2026-07-09 to close the wire blind spot: Reuters/Dawn resolve to
  # promoted_feed_summary (publisher blocks full-text fetch), and with this off
  # they were alerted but NEVER classified -- so a wire confirmation of a
  # senior-level round elsewhere could not fire the protective exit/rotate.
  # Trades off thin-summary noise, still gated by 2-pass agreement + wire-tier
  # source_tier + verbatim quote_must_match_article_text.
  classify_feed_summaries: true

time_decay:
  enabled: true
  # Provisional: ~2 weeks / 1 week before the Sept 30 deadline, mirroring the
  # July17 config's proportional trim/exit-before-deadline spacing. Revisit
  # closer to the date once there's more signal on how this actually plays out
  # over the 3-month runway.
  trim_after_date: "2026-09-16"
  exit_after_date: "2026-09-23"
  trim_fraction: 0.25
  min_trim_price: 0.05
  min_exit_price: 0.10

monitoring:
  price_alerts:
    enabled: true
    outcome: "qatar"
    # 0.15 is the stop-loss wakeup band: a crash below it likely means the
    # order book moved before a classifiable article reached the bot.
    thresholds: [0.15, 0.28, 0.40]
    # Keep trade execution simulated, but monitor real public CLOB quotes so
    # price alerts are not based on the dry-run adapter's synthetic 0.50 book.
    live_quotes_in_dry_run: true
  heartbeat:
    enabled: true
    interval_hours: 24

execution:
  # STAGED LIVE 2026-07-09: dry_run is off and the bot runs the real CLOB
  # backend (--live), but the operator position_mode is held at alert_only so
  # nothing actually trades. Flip to live with a single command when ready:
  #   python -m polybot.geopolitics set-location-mode --config configs/geopolitics/qatar-sept30-yes-protection.yaml --mode live
  # (config hash is already acked; revert with --mode alert_only or dry_run: true).
  dry_run: false
  sell:
    enabled: true
    min_price: 0.03
    retry_partial_once: true
    retry_delay_seconds: 2
    trim_fraction: 0.25
  buy_rotation:
    enabled: true
    # Rotation is only worth the extra resolution-dispute risk if the bot gets
    # there early enough to buy the confirmed venue below the post-confirmation
    # late-price zone. Otherwise degrade to clean sell-only exit.
    max_price: 0.85
    usd_budget: 900
    skip_if_above_cap: true

safety:
  one_shot: true
  cancel_open_orders_first: true
  query_live_position: true
  verify_fills_before_final_lock: true
  quote_must_match_article_text: true
  token_mapping_must_match: true
  degraded_mode_alert: true
  max_executions: 1
  poll_seconds: 10

sources:
  poll_urls:
    - "https://www.aljazeera.com/tag/israel-iran-conflict/"
  feed_urls:
    - "https://www.aljazeera.com/xml/rss/all.xml"
    # Dawn: settlement-relevant sequencing source for this thesis (see
    # analyst_context). Now fetches to full text via the /news/<id> slug-strip
    # fix in source_fetcher.
    - "https://www.dawn.com/feeds/home"
    # Reuters discovery via Google News RSS (no stable public Reuters RSS).
    # Items resolve to reuters.com URLs; reuters.com blocks direct fetch so
    # these stay promoted_feed_summary -- now classified (classify_feed_summaries
    # is true), gated by 2-pass + wire tier + verbatim quote.
    - "https://news.google.com/rss/search?q=site:reuters.com%20iran%20talks&hl=en-US&gl=US&ceid=US:en"
    # Added 2026-07-09 to widen source coverage so a senior-round confirmation
    # isn't missed just because AJ/Dawn/Reuters weren't the outlet to break it.
    #
    # Venue/round-targeted, outlet-agnostic: catches a venue announcement from
    # ANY publisher; highest-signal, lowest budget cost of the new feeds.
    - "https://news.google.com/rss/search?q=US%20Iran%20(talks%20OR%20round%20OR%20negotiations)%20(Doha%20OR%20Qatar%20OR%20Muscat%20OR%20Oman%20OR%20Islamabad%20OR%20Geneva%20OR%20Rome%20OR%20Vienna%20OR%20Istanbul)&hl=en-US&gl=US&ceid=US:en"
    # IRNA (official Iran, irna.ir is an auto_trade domain): official Iranian
    # announcement/denial of a round -- confirm-hold if Doha, kill-signal if
    # convened elsewhere.
    - "https://en.irna.ir/rss"
    # AP + AFP wire breadth via Google News (apnews.com/afp.com are auto_trade
    # domains; AFP often resolves to republishers so mostly alert-grade).
    - "https://news.google.com/rss/search?q=site:apnews.com%20US%20Iran%20(talks%20OR%20negotiations%20OR%20round)&hl=en-US&gl=US&ceid=US:en"
    - "https://news.google.com/rss/search?q=AFP%20US%20Iran%20(talks%20OR%20negotiations%20OR%20round)&hl=en-US&gl=US&ceid=US:en"
    # Regional discovery (timesofisrael.com and aa.com.tr are deliberately NOT
    # in auto_trade_domains -> alert-only; extra eyes, no new trade triggers).
    - "https://www.timesofisrael.com/feed/"
    - "https://news.google.com/rss/search?q=site:aa.com.tr%20Iran%20US%20(talks%20OR%20negotiations)&hl=en-US&gl=US&ceid=US:en"
  # Flattened source levels (operator decision 2026-07-06): all sources are
  # execution-grade, except feed items/promoted feed summaries while
  # classify_feed_summaries=false. The
  # remaining trade gates are the 2-pass classifier agreement, verbatim quote
  # verification, the classifier's tier-one source_tier requirement, the
  # 24h freshness gate below, and the operator gate.
  allow_feed_auto_trade: true
  promote_feed_to_article: true
  max_trade_article_age_hours: 24
  # Without include terms every AJ all.xml item is stored and classified
  # (Codex CLI call per article). Any relevant US-Iran talks item will
  # contain at least one of these.
  feed_include_terms:
    - "iran"
    - "u.s.-iran"
    - "us-iran"
  feed_exclude_terms:
    - "visa"
    - "visas"
    - "reciprocity"
    - "civil documents"
    - "travel advisory"
    - "travel.state.gov"
    - "aoprals.state.gov"
    - "2001-2009.state.gov"
    - "2009-2017.state.gov"
    - "2021-2025.state.gov"
    - "consular"
    - "passport"
    - "allowances"
  # All sources at the same level per operator decision 2026-07-06. Note the
  # decision engine still requires the classifier to rate the source_tier as
  # wire/mediator_government/official_government before any trade -- an X or
  # IRNA item only trades if the classifier judges it to carry an official
  # statement.
  auto_trade_domains:
    - "aljazeera.com"
    - "reuters.com"
    - "apnews.com"
    - "afp.com"
    - "state.gov"
    - "whitehouse.gov"
    - "mfa.gov.ir"
    - "mofa.gov.qa"
    - "fm.gov.om"
    - "mofa.gov.pk"
    - "dawn.com"
    - "x.com"
    - "twitter.com"
    - "t.me"
    - "irna.ir"
  alert_only_domains: []

data_dir: "data/location-protection-bot"
logs_dir: "logs"
