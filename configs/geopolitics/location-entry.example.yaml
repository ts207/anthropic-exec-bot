# Example: automated position ENTRY + defense on a grouped location market.
#
# The bot starts FLAT (event.held_location is empty). When a trusted tier-one
# source confirms a qualifying senior-level round at one of entry.targets, it
# buys that leg's YES (capped by entry.usd_budget / entry.max_price and the
# global POLYBOT_MAX_ENTRY_PRICE guardrail), records the holding in
# data_dir/holdings.json, and from then on defends the entered leg exactly
# like a pre-held position: news-triggered exits, rotation, and time decay.
#
# All existing safety machinery applies to entries too: dry-run is the
# default, the operator gate must be `live` with the config hash acked, the
# quote/source/freshness policies gate ENTER_YES like every other trade
# action, and entry.max_entries caps lifetime entries separately from
# safety.max_executions (which protects the defense budget).
# Live startup and every cycle reconcile all configured YES balances; multiple
# meaningful balances fail closed. Discovery/feed snippets may alert but cannot
# open a position without full publisher text.
#
# This file is NOT a live config: replace every slug/ID after running
# inspect-location and reviewing the live event, then pin
# expected_rule_text_sha256.

event:
  slug: "REPLACE-with-parent-grouped-event-slug"
  question: "Where will the next diplomatic US-Iran meeting be by September 30, 2026?"
  deadline_date: "2026-09-30"
  # Empty = start flat; requires entry.enabled below. Once the bot enters or
  # rotates, data_dir/holdings.json overrides this value.
  held_location: ""
  expected_rule_text_sha256: ""  # pin after inspect-location review
  resolution_rules: |
    Paste the verbatim market resolution text here after review.

outcomes:
  - name: qatar
    label: "Qatar"
    condition_id: "0xREPLACE"
    yes_token_id: "REPLACE"
    no_token_id: "REPLACE"
    rotation_target: true
  - name: oman
    label: "Oman"
    condition_id: "0xREPLACE"
    yes_token_id: "REPLACE"
    no_token_id: "REPLACE"
    rotation_target: true

entry:
  enabled: true
  # Only these outcome keys may be auto-bought from flat; confirmation of any
  # other venue is alert-only. Must not include held_location.
  targets: ["qatar", "oman"]
  usd_budget: 100.0
  max_price: 0.90
  max_spread: 0.20
  confirmed_probability: 0.97
  min_edge: 0.05
  slippage_buffer: 0.01
  resolution_risk_buffer: 0.02
  min_fill_usd: 5.0
  min_fill_fraction: 0.25
  reconcile_min_shares: 0.01
  max_entries: 1
  # Entries at/above this notional wait for a SECOND independent domain to
  # confirm inside the window (state ENTRY_AWAITING_SECOND_SOURCE). 0 = off.
  second_source_above_usd: 0.0
  second_source_window_minutes: 60.0
  # After an entry, a different domain must reinforce the thesis within this
  # window or you get alerted ("alert") / the position is trimmed ("trim").
  # 0 = off.
  corroboration_minutes: 0.0
  corroboration_action: "alert"

# Anticipatory evidence is research-only. It updates deterministic categorical
# probabilities and simulates entries/exits; no forecast code can submit an
# exchange order. Priors must cover every configured outcome and sum to 1.
forecast:
  enabled: true
  paper_only: true
  prior_probabilities:
    qatar: 0.60
    oman: 0.40
  min_paper_edge: 0.12
  max_paper_price: 0.70
  paper_order_usd: 10.0
  slippage_buffer: 0.02
  resolution_risk_buffer: 0.03
  exit_remaining_edge: 0.03
  model_version: "location-forecast-v2"
  live_quotes_in_dry_run: true
  quote_refresh_seconds: 2.0
  max_quote_age_seconds: 10.0
  max_spread: 0.20
  fee_rate: 0.0
  simulated_slippage: 0.005

position:
  max_yes_shares_to_sell: 100000.0
  max_rotation_usd_to_buy: 500.0
  # Sell the whole position when the held outcome's YES bid reaches this
  # price: once the thesis is priced in, the last few cents are not worth
  # carrying full resolution risk. 0 = hold to resolution/news exit.
  take_profit_price: 0.0

trigger:
  auto_execute_level: 4
  trusted_single_source_execution: true

classifier:
  provider: anthropic
  model: claude-opus-4-8
  passes: 2
  require_pass_agreement: true

execution:
  dry_run: true
  sell:
    enabled: true
    min_price: 0.03
    # Staged exits: <1.0 splits a defense sell into a first order of this
    # fraction plus the remainder after a requote delay (thin-book slippage).
    max_fraction_per_order: 1.0
  buy_rotation:
    enabled: true
    max_price: 0.95
    max_spread: 0.20
    usd_budget: 500.0

safety:
  one_shot: true
  # Defense budget only -- entries are capped by entry.max_entries instead,
  # so an entry never consumes the executions needed to protect the position
  # it just opened. 2 allows e.g. one rotation plus one final exit.
  max_executions: 2
  poll_seconds: 30.0

sources:
  poll_urls: []
  feed_urls: []
  # Persist full order-book depth at the moments that matter (article clears
  # the keyword gate, pre-order, post-fill) into book_snapshots.jsonl --
  # the dataset that calibrates slippage and proves the repricing window.
  log_book_snapshots: true

data_dir: data/location-entry-example
logs_dir: logs
